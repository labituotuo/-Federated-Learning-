<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP联邦学习 - 训练控制台</title>
    <script src="{{ url_for('static', filename='chart.min.js') }}"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/44ca7b07af12dd1b88c7e3274036c0f.jpg') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.5;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
            padding: 10px 20px;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .navbar a {
            color: #1a4017;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .navbar a:hover, .navbar a.active {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .header {
            text-align: center;
            color: #1a4017;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #5B8C5A;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-left: 4px solid #5B8C5A;
            padding-left: 15px;
        }

        .btn {
            position: relative;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            color: #1a4017;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/44ca7b07af12dd1b88c7e3274036c0f.jpg') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.5;
            border-radius: 25px;
            z-index: 0;
        }

        .btn > * {
            position: relative;
            z-index: 1;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 终端风格日志 */
        .log-container {
            max-height: 500px;
            overflow-y: auto;
            background: #0d1117;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #30363d;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
        }

        .log-container::-webkit-scrollbar {
            width: 6px;
        }

        .log-container::-webkit-scrollbar-track {
            background: #161b22;
        }

        .log-container::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 3px;
        }

        .log-item {
            margin: 2px 0;
            color: #c9d1d9;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-item .timestamp {
            color: #8b949e;
            margin-right: 8px;
        }

        .log-info { color: #58a6ff; }
        .log-success { color: #3fb950; }
        .log-warning { color: #d29922; }
        .log-error { color: #f85149; }
        .log-accent { color: #a371f7; }

        /* 控制面板 */
        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-group {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #000;
        }

        .control-group select,
        .control-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            background: white;
        }

        .control-group select:focus,
        .control-group input:focus {
            outline: none;
            border-color: #5B8C5A;
        }

        /* 指标展示 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .metric-item {
            position: relative;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: #1a4017;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .metric-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/44ca7b07af12dd1b88c7e3274036c0f.jpg') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.5;
            border-radius: 10px;
            z-index: 0;
        }

        .metric-item > * {
            position: relative;
            z-index: 1;
        }

        .metric-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        /* 图表容器 */
        .chart-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        canvas {
            max-height: 300px;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .control-panel {
                grid-template-columns: 1fr;
            }

        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <ul>
                <li><a href="/main" class="nav-link">数据展示</a></li>
                <li><a href="/http_fl" class="nav-link active">训练日志</a></li>
                <li><a href="#" onclick="logout()" style="background: rgba(255, 100, 100, 0.2);">退出登录</a></li>
            </ul>
        </nav>

        <div class="header">
            <h1>🤖 HTTP联邦学习 - 训练控制台</h1>
            <p>一键启动 · 实时监控 · 终端风格日志</p>
        </div>

        <!-- 控制面板 -->
        <div class="card">
            <h2>⚙️ 训练配置</h2>
            <div class="control-panel">
                <!-- 算法选择 -->
                <div class="control-group">
                    <label for="algorithm">选择算法</label>
                    <select id="algorithm" onchange="updateAlgorithmUI()">
                        <option value="fedavg">FedAvg</option>
                        <option value="fedprox">FedProx</option>
                        <option value="scaffold">SCAFFOLD</option>
                    </select>
                </div>

                <!-- FedProx 参数 -->
                <div class="control-group" id="muGroup" style="display: none;">
                    <label for="mu">FedProx μ值: <span id="muDisplay">0.01</span></label>
                    <input type="range" id="mu" min="0.001" max="0.1" step="0.001" value="0.01" 
                           oninput="document.getElementById('muDisplay').textContent = this.value">
                </div>

                <!-- 加密选项 -->
                <div class="control-group">
                    <label for="encryption">加密方式</label>
                    <select id="encryption">
                        <option value="none">无</option>
                        <option value="homomorphic">同态加密</option>
                    </select>
                </div>

                <!-- 隐私保护 -->
                <div class="control-group">
                    <label for="privacy">隐私保护</label>
                    <select id="privacy" onchange="togglePrivacyParams()">
                        <option value="none">无</option>
                        <option value="differential">差分隐私</option>
                    </select>
                </div>

                <!-- 差分隐私参数 -->
                <div id="privacyParams" style="display: none;">
                    <div class="control-group">
                        <label for="epsilon">隐私预算 ε (当前值: <span id="epsilonValue">1.0</span>)</label>
                        <input type="range" id="epsilon" min="0.1" max="10" step="0.1" value="1.0" 
                               oninput="updateEpsilon(this.value)">
                        <div class="range-labels">
                            <span>0.1</span>
                            <span>5.0</span>
                            <span>10</span>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="delta">失败概率 δ (当前值: <span id="deltaValue">0.00001</span>)</label>
                        <input type="range" id="delta" min="0.000001" max="0.01" step="0.000001" value="0.00001" 
                               oninput="updateDelta(this.value)">
                        <div class="range-labels">
                            <span>1e-6</span>
                            <span>5e-3</span>
                            <span>0.01</span>
                        </div>
                    </div>
                    <div class="control-group info-box">
                        <strong>💡 参数说明：</strong>
                        <ul>
                            <li><strong>ε (隐私预算)</strong>：越小隐私保护越强，但模型精度损失越大，常用范围: 0.1-10</li>
                            <li><strong>δ (失败概率)</strong>：越小越好，通常取数据集大小的倒数</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="card">
            <h2>🎮 训练控制</h2>

            <!-- 启动按钮 -->
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" id="startBtn" onclick="startTraining()">
                    🚀 开始训练
                </button>
                <p id="statusMessage" style="margin-top: 15px; color: #000;"></p>
            </div>
        </div>

        <!-- 训练日志 -->
        <div class="card">
            <h2>📊 训练日志</h2>
            <div class="log-container" id="logContainer">
                <div class="log-item"><span class="timestamp">[系统]</span><span class="log-info"> 欢迎使用 HTTP 联邦学习训练控制台</span></div>
                <div class="log-item"><span class="timestamp">[系统]</span><span class="log-info"> 点击"开始训练"启动联邦学习任务</span></div>
            </div>
        </div>

        <!-- 训练指标 -->
        <div class="card">
            <h2>🏆 训练指标</h2>
            <div class="metrics-grid">
                <div class="metric-item">
                    <div class="metric-label">准确率</div>
                    <div class="metric-value" id="final-acc">--</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">精确率</div>
                    <div class="metric-value" id="final-precision">--</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">查全率</div>
                    <div class="metric-value" id="final-recall">--</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">F1分数</div>
                    <div class="metric-value" id="final-f1">--</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">训练耗时</div>
                    <div class="metric-value" id="final-time">--</div>
                </div>
            </div>

            <!-- 指标变化图表 -->
            <div class="chart-container">
                <canvas id="trainingChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chart = null;
        let metricsData = { rounds: [], acc: [], precision: [], recall: [], f1: [] };
        let pollingInterval = null;
        let isTraining = false;

        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('trainingChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: '准确率', data: [], borderColor: '#5B8C5A', tension: 0.3 },
                        { label: '精确率', data: [], borderColor: '#4CAF50', tension: 0.3 },
                        { label: '查全率', data: [], borderColor: '#ff9800', tension: 0.3 },
                        { label: 'F1分数', data: [], borderColor: '#f44336', tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { min: 0, max: 1, title: { display: true, text: '指标值' } },
                        x: { title: { display: true, text: '训练轮次' } }
                    }
                }
            });
        }

        // 更新图表
        function updateChart() {
            if (!chart) return;
            chart.data.labels = metricsData.rounds.map(r => `第${r}轮`);
            chart.data.datasets[0].data = metricsData.acc;
            chart.data.datasets[1].data = metricsData.precision;
            chart.data.datasets[2].data = metricsData.recall;
            chart.data.datasets[3].data = metricsData.f1;
            chart.update('none');
        }

        // 添加日志
        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString('zh-CN');
            const typeClass = `log-${type}`;
            const logItem = `<div class="log-item"><span class="timestamp">[${timestamp}]</span><span class="${typeClass}"> ${message}</span></div>`;
            container.innerHTML += logItem;
            container.scrollTop = container.scrollHeight;
        }

        // 更新算法UI
        function updateAlgorithmUI() {
            const algorithm = document.getElementById('algorithm').value;
            document.getElementById('muGroup').style.display = algorithm === 'fedprox' ? 'block' : 'none';
        }

        // 开始训练
        // 切换差分隐私参数显示
        function togglePrivacyParams() {
            const privacy = document.getElementById('privacy').value;
            const paramsDiv = document.getElementById('privacyParams');
            paramsDiv.style.display = privacy === 'differential' ? 'block' : 'none';
        }

        // 更新epsilon显示
        function updateEpsilon(value) {
            document.getElementById('epsilonValue').textContent = parseFloat(value).toFixed(1);
        }

        // 更新delta显示
        function updateDelta(value) {
            const numValue = parseFloat(value);
            if (numValue < 0.001) {
                document.getElementById('deltaValue').textContent = numValue.toExponential(1);
            } else {
                document.getElementById('deltaValue').textContent = numValue.toFixed(5);
            }
        }

        async function startTraining() {
            const btn = document.getElementById('startBtn');
            const statusMsg = document.getElementById('statusMessage');

            if (isTraining) return;

            isTraining = true;
            btn.disabled = true;
            btn.textContent = '训练中...';
            statusMsg.textContent = '正在启动服务器和客户端...';

            // 重置数据
            metricsData = { rounds: [], acc: [], precision: [], recall: [], f1: [] };
            updateChart();
            ['final-acc', 'final-precision', 'final-recall', 'final-f1', 'final-time'].forEach(id => {
                document.getElementById(id).textContent = '--';
            });

            // 获取配置
            const algorithm = document.getElementById('algorithm').value;
            const mu = algorithm === 'fedprox' ? document.getElementById('mu').value : '0.01';
            const encryption = document.getElementById('encryption').value;
            const privacy = document.getElementById('privacy').value;
            
            // 获取差分隐私参数
            const epsilon = parseFloat(document.getElementById('epsilon').value);
            const delta = parseFloat(document.getElementById('delta').value);

            addLog(`启动训练 - 算法: ${algorithm.toUpperCase()}, 加密: ${encryption}, 隐私: ${privacy}`, 'info');
            if (privacy === 'differential') {
                addLog(`差分隐私参数 - ε: ${epsilon}, δ: ${delta}`, 'info');
            }

            try {
                const response = await fetch('/api/start_fl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        algorithm,
                        mu: parseFloat(mu),
                        encryption,
                        privacy,
                        epsilon,
                        delta
                    })
                });

                const result = await response.json();
                if (result.success) {
                    statusMsg.textContent = '启动成功！正在训练...';
                    addLog('服务器和客户端启动成功', 'success');
                    startPolling();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                addLog(`启动失败: ${error.message}`, 'error');
                statusMsg.textContent = `启动失败: ${error.message}`;
                isTraining = false;
                btn.disabled = false;
                btn.textContent = '🚀 开始训练';
            }
        }

        // 轮询训练状态
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);

            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch('http://localhost:5001/api/training_status');
                    if (!response.ok) throw new Error('获取状态失败');

                    const status = await response.json();

                    // 更新指标
                    if (status.metrics && status.metrics.length > 0) {
                        const lastMetric = status.metrics[status.metrics.length - 1];
                        const round = status.metrics.length;

                        if (!metricsData.rounds.includes(round)) {
                            metricsData.rounds.push(round);
                            metricsData.acc.push(lastMetric.global_accuracy || 0);
                            metricsData.precision.push(lastMetric.global_precision || 0);
                            metricsData.recall.push(lastMetric.global_recall || 0);
                            metricsData.f1.push(lastMetric.global_f1 || 0);
                            updateChart();
                            addLog(`第 ${round} 轮完成 - 准确率: ${(lastMetric.global_accuracy * 100).toFixed(2)}%`, 'success');
                        }
                    }

                    // 训练完成
                    if (status.training_complete) {
                        clearInterval(pollingInterval);
                        pollingInterval = null;

                        if (status.final_metrics) {
                            document.getElementById('final-acc').textContent = 
                                (status.final_metrics.accuracy * 100).toFixed(2) + '%';
                            document.getElementById('final-precision').textContent = 
                                (status.final_metrics.precision * 100).toFixed(2) + '%';
                            document.getElementById('final-recall').textContent = 
                                (status.final_metrics.recall * 100).toFixed(2) + '%';
                            document.getElementById('final-f1').textContent = 
                                (status.final_metrics.f1 * 100).toFixed(2) + '%';
                            document.getElementById('final-time').textContent = 
                                status.final_metrics.duration + '秒';
                        }

                        addLog('训练完成！', 'success');
                        document.getElementById('statusMessage').textContent = '训练完成！';
                        isTraining = false;
                        document.getElementById('startBtn').disabled = false;
                        document.getElementById('startBtn').textContent = '🚀 开始训练';
                    }

                } catch (error) {
                    if (metricsData.rounds.length > 0 && isTraining) {
                        addLog('服务器已关闭，训练结束', 'warning');
                        document.getElementById('statusMessage').textContent = '训练完成！(服务器已关闭)';
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                        isTraining = false;
                        document.getElementById('startBtn').disabled = false;
                        document.getElementById('startBtn').textContent = '🚀 开始训练';
                    }
                }
            }, 2000);
        }

        // 退出登录
        function logout() {
            window.location.href = '/logout';
        }

        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            checkServiceStatus();
        });
    </script>
</body>
</html>
