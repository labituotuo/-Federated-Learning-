<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖尿病预测 - 联邦学习系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/44ca7b07af12dd1b88c7e3274036c0f.jpg') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.5;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            position: relative;
            color: #1a4017;
            padding: 20px;
            text-align: center;
            border-radius: 15px 15px 0 0;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/44ca7b07af12dd1b88c7e3274036c0f.jpg') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.5;
            border-radius: 15px 15px 0 0;
            z-index: 0;
        }

        .header > * {
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 1.5em;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 1em;
            opacity: 0.9;
        }

        .navbar {
            position: relative;
            border-radius: 15px;
            margin-bottom: 30px;
            padding: 10px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .navbar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/44ca7b07af12dd1b88c7e3274036c0f.jpg') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.5;
            border-radius: 15px;
            z-index: 0;
        }

        .navbar > * {
            position: relative;
            z-index: 1;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .navbar a {
            color: #1a4017;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .navbar a:hover, .navbar a.active {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .content {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #5B8C5A;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-left: 4px solid #5B8C5A;
            padding-left: 15px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #000;
        }

        .form-section {
            margin-bottom: 20px;
        }

        .form-section h2 {
            color: #5B8C5A;
            font-size: 1.2em;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #5B8C5A;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            color: #000;
            margin-bottom: 4px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .required {
            color: #e74c3c;
        }

        .form-group input,
        .form-group select {
            padding: 8px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #5B8C5A;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            position: relative;
            color: #1a4017;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/44ca7b07af12dd1b88c7e3274036c0f.jpg') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.5;
            border-radius: 20px;
            z-index: 0;
        }

        .btn-primary > * {
            position: relative;
            z-index: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #000;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .result-container {
            margin-top: 30px;
            padding: 0;
            border-radius: 15px;
            display: none;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            padding: 30px;
            text-align: center;
            color: #1a4017;
            position: relative;
        }

        .result-low .result-header {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }

        .result-medium .result-header {
            background: linear-gradient(135deg, #f39c12 0%, #f1c40f 100%);
        }

        .result-high .result-header {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .result-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        .result-probability {
            font-size: 4em;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .result-confidence {
            font-size: 1em;
            opacity: 0.9;
        }

        .result-body {
            padding: 30px;
            background: white;
        }

        /* AI报告按钮样式 */
        .ai-report-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 35px;
            color: #1a4017;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .ai-report-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/44ca7b07af12dd1b88c7e3274036c0f.jpg') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.5;
            border-radius: 30px;
            z-index: 0;
        }

        .ai-report-btn > * {
            position: relative;
            z-index: 1;
        }

        .ai-report-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
        }

        .btn-icon {
            font-size: 1.3em;
        }

        .btn-arrow {
            font-size: 1.2em;
            transition: transform 0.3s ease;
        }

        .ai-report-btn:hover .btn-arrow {
            transform: translateX(5px);
        }

        .loading {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #5B8C5A;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .model-status {
            text-align: center;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #000;
        }

        .model-loaded {
            color: #27ae60;
        }

        .model-error {
            color: #e74c3c;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #5B8C5A;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-left: 4px solid #5B8C5A;
            padding-left: 15px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #c33;
            margin: 10px 0;
        }

        .btn-primary {
            position: relative;
            color: #1a4017;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/44ca7b07af12dd1b88c7e3274036c0f.jpg') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.5;
            border-radius: 8px;
            z-index: 0;
        }

        .btn-primary > * {
            position: relative;
            z-index: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .btn-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>糖尿病风险预测</h1>
            <p>基于联邦学习模型的健康风险评估</p>
        </div>

        <nav class="navbar">
            <ul>
                <li><a href="/profile" class="nav-link">用户画像</a></li>
                <li><a href="/predict" class="nav-link active">健康预测</a></li>
                <li><a href="/report" class="nav-link">健康报告</a></li>
                <li><a href="#" onclick="logout()" style="background: rgba(255, 100, 100, 0.2);">退出登录</a></li>
            </ul>
        </nav>

        <div class="content">
            <div class="model-status" id="modelStatus">
                正在检查模型状态...
            </div>

            <!-- 预测页面 -->
            <div id="predictPage">
            <form id="predictForm">
                <div class="form-section">
                    <h2>基本信息</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>年龄 <span class="required">*</span></label>
                            <input type="number" name="年龄" value="55" min="20" max="90" required>
                        </div>
                        <div class="form-group">
                            <label>性别 <span class="required">*</span></label>
                            <select name="性别" required>
                                <option value="0" selected>男性</option>
                                <option value="1">女性</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>种族 <span class="required">*</span></label>
                            <select name="种族" required>
                                <option value="0" selected>白人</option>
                                <option value="1">非裔美国人</option>
                                <option value="2">亚洲</option>
                                <option value="3">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>社会经济地位</label>
                            <select name="社会经济地位">
                                <option value="0">低</option>
                                <option value="1" selected>中间</option>
                                <option value="2">高</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>教育水平</label>
                            <select name="教育水平">
                                <option value="0">无</option>
                                <option value="1">高中</option>
                                <option value="2" selected>学士学位</option>
                                <option value="3">更高</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>身高 (cm)</label>
                            <input type="number" name="身高" value="170" step="1" min="100" max="220">
                        </div>
                        <div class="form-group">
                            <label>体重 (kg)</label>
                            <input type="number" name="体重" value="75" step="0.1" min="30" max="200">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>生活方式</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>吸烟状态</label>
                            <select name="吸烟状态">
                                <option value="0" selected>不</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>饮酒量 (单位/周)</label>
                            <input type="number" name="饮酒量" value="10" min="0" max="20">
                        </div>
                        <div class="form-group">
                            <label>每周体育活动时间 (小时/周)</label>
                            <input type="number" name="每周体育活动时间" value="5" min="0" max="10" step="0.5">
                        </div>
                        <div class="form-group">
                            <label>饮食质量 (0-10)</label>
                            <input type="number" name="饮食质量" value="5" min="0" max="10">
                        </div>
                        <div class="form-group">
                            <label>睡眠质量 (4-10)</label>
                            <input type="number" name="睡眠质量" value="7" min="4" max="10">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>病史</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>糖尿病家族史</label>
                            <select name="糖尿病家族史">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>妊娠期糖尿病</label>
                            <select name="妊娠期糖尿病">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>多囊卵巢综合征</label>
                            <select name="多囊卵巢综合征">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>既往糖尿病前期</label>
                            <select name="既往糖尿病前期">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>高血压</label>
                            <select name="高血压">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>临床测量</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>收缩压 (mmHg)</label>
                            <input type="number" name="收缩压" value="134" min="90" max="180">
                        </div>
                        <div class="form-group">
                            <label>舒张压 (mmHg)</label>
                            <input type="number" name="舒张压" value="90" min="60" max="120">
                        </div>
                        <div class="form-group">
                            <label>空腹血糖 (mg/dL)</label>
                            <input type="number" name="空腹血糖" value="135" min="70" max="200">
                        </div>
                        <div class="form-group">
                            <label>糖化血红蛋白 (%)</label>
                            <input type="number" name="糖化血红蛋白" value="7.0" step="0.1" min="4.0" max="10.0">
                        </div>
                        <div class="form-group">
                            <label>血清肌酐 (mg/dL)</label>
                            <input type="number" name="血清肌酐" value="2.8" step="0.1" min="0.5" max="5.0">
                        </div>
                        <div class="form-group">
                            <label>血尿素氮水平 (mg/dL)</label>
                            <input type="number" name="血尿素氮水平" value="28" min="5" max="50">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>血脂指标</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>总胆固醇 (mg/dL)</label>
                            <input type="number" name="总胆固醇" value="225" min="150" max="300">
                        </div>
                        <div class="form-group">
                            <label>低密度脂蛋白胆固醇 (mg/dL)</label>
                            <input type="number" name="低密度脂蛋白胆固醇" value="125" min="50" max="200">
                        </div>
                        <div class="form-group">
                            <label>高密度脂蛋白胆固醇 (mg/dL)</label>
                            <input type="number" name="高密度脂蛋白胆固醇" value="60" min="20" max="100">
                        </div>
                        <div class="form-group">
                            <label>甘油三酯 (mg/dL)</label>
                            <input type="number" name="甘油三酯" value="227" min="50" max="400">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>药物</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>降压药物使用</label>
                            <select name="降压药物使用">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>他汀类药物使用</label>
                            <select name="他汀类药物使用">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>抗糖尿病药物使用</label>
                            <select name="抗糖尿病药物使用">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>症状与生活质量</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>尿频</label>
                            <select name="尿频">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>过度口渴</label>
                            <select name="过度口渴">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>不明原因体重下降</label>
                            <select name="不明原因体重下降">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>疲劳程度 (0-10)</label>
                            <input type="number" name="疲劳程度" value="5" min="0" max="10">
                        </div>
                        <div class="form-group">
                            <label>视力模糊</label>
                            <select name="视力模糊">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>伤口愈合缓慢</label>
                            <select name="伤口愈合缓慢">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>手脚刺痛</label>
                            <select name="手脚刺痛">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>生活质量评分 (0-100)</label>
                            <input type="number" name="生活质量评分" value="49" min="0" max="100">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>环境与职业暴露</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>重金属暴露</label>
                            <select name="重金属暴露">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>职业化学物质暴露</label>
                            <select name="职业化学物质暴露">
                                <option value="0" selected>否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>水质</label>
                            <select name="水质">
                                <option value="0" selected>良好</option>
                                <option value="1">差</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>健康行为</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>体检频率 (0-4次/年)</label>
                            <input type="number" name="体检频率" value="2" min="0" max="4">
                        </div>
                        <div class="form-group">
                            <label>药物依从性 (0-10)</label>
                            <input type="number" name="药物依从性" value="5" min="0" max="10">
                        </div>
                        <div class="form-group">
                            <label>健康素养 (0-10)</label>
                            <input type="number" name="健康素养" value="5" min="0" max="10">
                        </div>
                    </div>
                </div>

                <div class="btn-container">
                    <button type="submit" class="btn btn-primary">开始预测</button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">重置为默认值</button>
                </div>
            </form>

            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>正在分析数据，请稍候...</p>
            </div>

            <div class="result-container" id="resultContainer">
                <div class="result-header">
                    <div class="result-badge" id="resultTitle">预测结果</div>
                    <div class="result-probability" id="resultProbability">0%</div>
                </div>
                <div class="result-body">
                    <!-- AI报告按钮 -->
                    <div style="text-align: center; margin-bottom: 25px;">
                        <a href="/report" class="ai-report-btn" id="aiReportBtn">
                            <span class="btn-icon">🤖</span>
                            <span>查看 AI 健康管理报告</span>
                            <span class="btn-arrow">→</span>
                        </a>
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>

    <script>
        let modelPollingInterval = null;
        let lastModelVersion = null;
        
        // 检查模型状态
        function checkModelStatus() {
            fetch('/api/model/status')
                .then(response => response.json())
                .then(data => {
                    const statusEl = document.getElementById('modelStatus');
                    if (data.model_loaded) {
                        // 检查模型是否更新
                        if (data.model_version !== lastModelVersion) {
                            lastModelVersion = data.model_version;
                            statusEl.innerHTML += ' <span style="color: #4CAF50; font-weight: bold;">(新模型已加载)</span>';
                        }
                        
                        let statusText = '✓ 模型已加载: ' + data.model_version;
                        
                        // 显示准确率
                        if (data.accuracy !== undefined && data.accuracy > 0) {
                            statusText += ' | 准确率: ' + (data.accuracy * 100).toFixed(1) + '%';
                        }
                        
                        // 显示更新时间
                        if (data.last_updated) {
                            statusText += ' (最后更新: ' + data.last_updated + ')';
                        }
                        
                        statusEl.innerHTML = statusText;
                        statusEl.className = 'model-status model-loaded';
                    } else {
                        lastModelVersion = null;
                        statusEl.innerHTML = '✗ 模型未加载，请先进行训练';
                        statusEl.className = 'model-status model-error';
                    }
                })
                .catch(error => {
                    document.getElementById('modelStatus').innerHTML = 
                        '✗ 无法连接服务器: ' + error.message;
                    document.getElementById('modelStatus').className = 'model-status model-error';
                });
        }
        
        // 启动模型状态轮询
        function startModelPolling() {
            if (modelPollingInterval) {
                clearInterval(modelPollingInterval);
            }
            // 每5秒检查一次模型状态
            modelPollingInterval = setInterval(checkModelStatus, 5000);
        }

        // 表单提交
        document.getElementById('predictForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const inputData = {};
            
            // 计算BMI
            const height = parseFloat(formData.get('身高')) / 100; // 转换为米
            const weight = parseFloat(formData.get('体重'));
            const bmi = weight / (height * height);
            
            for (let [key, value] of formData.entries()) {
                // 跳过身高和体重，用计算出的BMI替代
                if (key === '身高' || key === '体重') {
                    continue;
                }
                // 处理数值类型
                if (key === '体重指数' || key === '糖化血红蛋白' || key === '血清肌酐' ||
                    key === '血尿素氮水平' || key === '总胆固醇' || key === '低密度脂蛋白胆固醇' ||
                    key === '高密度脂蛋白胆固醇' || key === '甘油三酯' || key === '饮酒量' ||
                    key === '每周体育活动时间' || key === '饮食质量' || key === '睡眠质量' ||
                    key === '疲劳程度' || key === '生活质量评分' || key === '药物依从性' ||
                    key === '健康素养' || key === '体检频率') {
                    inputData[key] = parseFloat(value);
                } else {
                    inputData[key] = parseInt(value);
                }
            }
            
            // 添加BMI到输入数据
            inputData['体重指数'] = parseFloat(bmi.toFixed(1));
            
            // 显示加载状态
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';
            
            fetch('/api/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify(inputData)
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                
                if (data.success) {
                    // 保存数据到 localStorage 供报告页面使用
                    localStorage.setItem('lastPredictData', JSON.stringify({
                        inputData: inputData,
                        probability: data.probability,
                        timestamp: new Date().toISOString()
                    }));
                    displayResult(data);
                } else {
                    alert('预测失败: ' + data.message);
                }
            })
            .catch(error => {
                document.getElementById('loading').style.display = 'none';
                alert('预测请求失败: ' + error.message);
            });
        });

        // 显示预测结果
        function displayResult(data) {
            const container = document.getElementById('resultContainer');
            const probability = data.probability * 100;
            
            // 设置结果样式
            container.className = 'result-container';
            if (probability < 30) {
                container.classList.add('result-low');
                document.getElementById('resultTitle').textContent = '低风险';
            } else if (probability < 70) {
                container.classList.add('result-medium');
                document.getElementById('resultTitle').textContent = '中等风险';
            } else {
                container.classList.add('result-high');
                document.getElementById('resultTitle').textContent = '高风险';
            }
            
            document.getElementById('resultProbability').textContent = probability.toFixed(1) + '%';
            
            container.style.display = 'block';
        }

        // 重置表单
        function resetForm() {
            document.getElementById('predictForm').reset();
            // 重新设置默认值
            location.reload();
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                fetch('/api/logout', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/login';
                    }
                })
                .catch(error => {
                    console.error('退出登录失败:', error);
                    alert('退出登录失败，请重试');
                });
            }
        }

        // 页面加载时检查模型状态并启动轮询
        window.onload = function() {
            checkModelStatus();
            startModelPolling();
        };
    </script>
</body>
</html>
